<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alan Partridge Soundboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>Alan Partridge Soundboard</h1>
      <p>Click any sample to play it. Hover to reveal colour and text changes.</p>
    </header>

    <section class="soundboard">
      <div class="sample-grid" id="sampleGrid" aria-label="Alan Partridge audio samples"></div>
    </section>

    <footer>
      <p>All samples should be stored in the <code>audio</code> folder and loaded locally.</p>
    </footer>
  </main>

  <script src="index.js"></script>
</body>
</html>
