<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" type="text/css" />
    <link rel="stylesheet" href="additionalStyle.css" type="text/css" />
    <title>Styling those divs</title>
  </head>
  <body>
    <div id="A">
      <img
        src="image1.jpg"
        alt="Card A user-supplied landscape photo"
        title="الصورة الأولى في المربع A"
        width="1280"
        height="853"
      />
      <p>div#A</p>
      <p class="license">License: user-supplied image cleared for display.</p>
    </div>

    <div id="B">
      <img
        src="image2.jpg"
        alt="Card B user-supplied landscape photo"
        title="الصورة الثانية في المربع B"
        width="1280"
        height="853"
      />
      <p>div#B</p>
      <p class="license">License: user-supplied image cleared for display.</p>
    </div>

    <div id="C">
      <img
        src="image3.jpg"
        alt="Card C user-supplied landscape photo"
        title="الصورة الثالثة في المربع C"
        width="1280"
        height="960"
      />
      <p>div#C</p>
      <p class="license">License: user-supplied image cleared for display.</p>
    </div>

    <div id="D">
      <img
        src="image4.jpg"
        alt="Card D user-supplied portrait photo"
        title="الصورة الرابعة في المربع D"
        width="853"
        height="1280"
      />
      <p>div#D</p>
      <p class="license">License: user-supplied image cleared for display.</p>
    </div>
  </body>
</html>
