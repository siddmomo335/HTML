<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed Video</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="video-card">
      <h1>Local Video Showcase</h1>
      <p class="subtitle">A locally hosted video that loops, uses a poster image, and stays centred.</p>
      <video controls loop poster="poster.svg">
        <source src="video.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
      </video>
      <p class="caption">This page uses the local file <code>video.mp4</code> and a custom poster image <code>poster.svg</code>.</p>
    </div>
  </div>
</body>
</html>
